<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ayni IA — Próximamente</title>
  <link rel="icon" type="image/png" href="ayniAI__favi.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #25D366;
      --green-dark: #1aad52;
      --teal: #00e5c3;
      --bg: #060c10;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8f0ee;
      --muted: rgba(232,240,238,0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,229,195,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(37,211,102,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(0,180,150,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animated grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,195,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,195,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Falling particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--teal), transparent);
      animation: fall linear infinite;
      opacity: 0;
    }

    @keyframes fall {
      0%   { transform: translateY(-100px); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* Main wrapper */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 3rem 1.5rem;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,229,195,0.08);
      border: 1px solid rgba(0,229,195,0.2);
      color: var(--teal);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.72rem;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: fadeSlideDown 0.8s ease both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* Logo */
    .logo-wrap {
      animation: fadeSlideDown 0.9s 0.1s ease both;
    }

    .logo {
      width: 220px;
      max-width: 70vw;
      filter: drop-shadow(0 0 30px rgba(0,229,195,0.25));
      transition: filter 0.3s ease;
    }

    .logo:hover {
      filter: drop-shadow(0 0 45px rgba(0,229,195,0.45));
    }

    /* Headline */
    .headline {
      text-align: center;
      animation: fadeSlideDown 0.9s 0.2s ease both;
    }

    .headline h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, var(--teal) 60%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    .headline p {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      animation: fadeIn 1s 0.3s both;
    }

    /* Video */
    .video-wrap {
      width: 100%;
      animation: fadeSlideUp 1s 0.35s ease both;
    }

    .video-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,229,195,0.06),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(0,229,195,0.05);
      transition: box-shadow 0.4s ease, transform 0.4s ease;
    }

    .video-card:hover {
      box-shadow:
        0 0 0 1px rgba(0,229,195,0.15),
        0 24px 70px rgba(0,0,0,0.55),
        0 0 100px rgba(0,229,195,0.10);
      transform: translateY(-3px);
    }

    .video-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .video-label span {
      color: var(--teal);
    }

    .video-label-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .video-ratio {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
    }

    .video-ratio iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Contact button */
    .contact-wrap {
      animation: fadeSlideUp 1s 0.5s ease both;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--green) 0%, #1aad52 100%);
      color: #fff;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 24px rgba(37,211,102,0.3), 0 0 0 0 rgba(37,211,102,0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .contact-link::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .contact-link:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 36px rgba(37,211,102,0.45), 0 0 0 4px rgba(37,211,102,0.12);
    }

    .contact-link:hover::after {
      opacity: 1;
    }

    .wa-icon {
      width: 22px;
      height: 22px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(232,240,238,0.2);
      padding-bottom: 1.5rem;
      font-family: 'DM Sans', sans-serif;
      animation: fadeIn 1.5s 0.8s both;
    }

    /* Animations */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 520px) {
      .contact-link { padding: 14px 24px; font-size: 0.9rem; }
      .wrapper { gap: 2rem; padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- Falling particles -->
  <div class="particles" id="particles"></div>

  <div class="wrapper">

    <!-- Badge -->
    <div class="badge">
      <span class="badge-dot"></span>

    </div>

    <div class="headline">

    <div class="video-wrap">

          <span class="video-label-dot"></span>

        </div>

          <iframe

          </iframe>

    <div class="contact-wrap">
      <a class="contact-link" href="https://wa.me/543512185252" target="_blank">

      </a>
    </div>

  </div>

  <footer>© 2025 ayni IA · Todos los derechos reservados</footer>

  <script>
    // Generate falling particles
    const container = document.getElementById('particles');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const left = Math.random() * 100;
      const height = 40 + Math.random() * 120;
      const duration = 4 + Math.random() * 8;
      const delay = Math.random() * 10;
      p.style.cssText = `
        left: ${left}%;
        height: ${height}px;
        animation-duration: ${duration}s;
        animation-delay: ${delay}s;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  </script>

</body>
</html>
